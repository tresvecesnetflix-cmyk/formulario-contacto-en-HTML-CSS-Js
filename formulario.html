<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</title>
</head>
<body>
    <div class="container">
        <h1>Formulario de contacto</h1>
        <form id="container">
          <div class="form-group">
            <label for="name">Nombre:</label>
            <input type="text" id="name" name="name" required>
          </div>
             <div class="form-group">
            <label for="email">Email:</label>
            <input type="text" id="name" name="email" required>
          </div>
          
                  <div class="form-group">
            <label for="phone">Telefono:</label>
            <input type="tel" id="phone" name="phone">
          </div>

                        <div class="form-group">
            <label for="subject">Asunto:</label>
            <input type="text" id="subject" name="subject">
          </div>


                        <div class="form-group">
            <label for="message">Mensaje:</label>
            <textarea rows="5" id="message" name="message"></textarea>
          </div>

                         <div class="form-group">
            <label for="company">Empresa:</label>
            <input type="text" id="company" name="company">
          </div>


                 <div class="form-group">
            <label for="website">Sitio web:</label>
            <input type="url" id="website" name="website">
          </div>


                    <div class="form-group">
            <label for="budget">Presupuesto:</label>
            <input type="number" id="budget" name="budget" step="0.01">
          </div>

          <button type="submit">Enviar</button>

          <div id="successMessage" class="success-message">Mensaje Enviado Con Exito!!!</div>
        </form>
    </div>
</body>
</html>
